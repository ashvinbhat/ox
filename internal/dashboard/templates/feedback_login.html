<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Login - Ox Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <span class="text-4xl">🐂</span>
            <h1 class="text-2xl font-bold mt-2">Feedback Access</h1>
            <p class="text-gray-400 text-sm">Enter password to continue</p>
        </div>

        {{if .Error}}
        <div class="bg-red-600 text-white px-4 py-2 rounded mb-4 text-center">
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/feedback/login">
            <div class="mb-4">
                <input type="password" name="password" placeholder="Password" autofocus
                       class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-3 rounded font-medium">
                Access Feedback
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-gray-400 hover:text-gray-300 text-sm">&larr; Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
